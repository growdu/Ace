version: '3.8'

services:
  # 游戏后端服务
  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ace-network

  # 前端构建与 Nginx 服务
  client:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - ace-network

networks:
  ace-network:
    driver: bridge